name: CI

# Quality gates for the swift-ios-game-studio package.
# Runs on every push to main and on pull requests.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Validate skill, agents & example
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select a Swift 6 toolchain (Xcode 16+)
        run: |
          latest="$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1 || true)"
          if [ -n "$latest" ]; then sudo xcode-select -s "$latest"; fi
          swift --version

      # The validator also runs both sync --checks (skill + agents), JSON/plist validity,
      # frontmatter/name==folder, script syntax, and the Cursor globs format check.
      - name: Structural quality gate (frontmatter, sync, JSON, plist, globs)
        run: .agents/skills/swift-ios-game-studio/scripts/validate-skill.sh

      - name: Swift format lint (enforce the Swift quality bar)
        run: |
          swift format lint --strict --parallel --recursive \
            --configuration .swift-format \
            examples/MemoryMatch/Sources \
            examples/MemoryMatch/Tests \
            examples/MemoryMatch/App \
            examples/SkyHopper/Sources \
            examples/SkyHopper/Tests \
            examples/SkyHopper/App \
            .agents/skills/swift-ios-game-studio/assets

      - name: Build the example game cores
        run: |
          swift build --package-path examples/MemoryMatch
          swift build --package-path examples/SkyHopper

      - name: Test the example game cores
        run: |
          swift test --package-path examples/MemoryMatch
          swift test --package-path examples/SkyHopper

      - name: Scaffold smoke test (non-destructive)
        run: |
          .agents/skills/swift-ios-game-studio/scripts/scaffold-game-module.py \
            --name CiSmoke --type memory-cards --dest "$RUNNER_TEMP/scaffold-test"
          test -f "$RUNNER_TEMP/scaffold-test/CiSmoke/Models/CiSmokeModel.swift"

      - name: Validate sample level against schema
        run: |
          .agents/skills/swift-ios-game-studio/scripts/validate-levels.py \
            .agents/skills/swift-ios-game-studio/assets/example-level.json

      - name: swift-doctor health check (example games must be healthy)
        run: |
          # The clean reference games must pass with no error-severity failures (exit 0).
          .agents/skills/swift-ios-game-studio/scripts/swift-doctor.py examples/MemoryMatch
          .agents/skills/swift-ios-game-studio/scripts/swift-doctor.py examples/SkyHopper
          # Smoke-test JSON output (must be valid, not crash).
          .agents/skills/swift-ios-game-studio/scripts/swift-doctor.py examples/SkyHopper --json >/dev/null
